site_name: PhronesisML Documentation
site_url: https://kartik00052.github.io/Phronesisml/
repo_url: https://github.com/kartik00052/PhronesisML
repo_name: kartik00052/PhronesisML
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - def_list
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            heading_level: 3
            members_order: source
            docstring_style: google
            merge_init_into_class: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Design Decisions: design-decisions.md
  - Guides:
    - Incremental Usage: guides/incremental.md
    - Simple API: guides/simple-api.md
    - Advanced API: guides/advanced-api.md
    - REST API: guides/rest-api.md
    - CLI: guides/cli.md
  - Examples: examples.md
  - API Reference: api.md
  - Troubleshooting: troubleshooting.md
  - Limitations: limitations.md
