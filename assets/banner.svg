<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F0B2E"/>
      <stop offset="45%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#0B1220"/>
    </linearGradient>
    <linearGradient id="waveGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#A855F7" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="waveGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#6366F1" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="50%" stop-color="#C084FC"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A855F7" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="280" fill="url(#bgGrad)"/>

  <!-- subtle knowledge-graph nodes, evoking agents/flow of reasoning -->
  <g opacity="0.55">
    <circle cx="90" cy="60" r="2.4" fill="#A855F7"/>
    <circle cx="150" cy="40" r="1.6" fill="#22D3EE"/>
    <circle cx="60" cy="130" r="1.8" fill="#6366F1"/>
    <circle cx="1120" cy="55" r="2.2" fill="#22D3EE"/>
    <circle cx="1060" cy="95" r="1.6" fill="#A855F7"/>
    <circle cx="1150" cy="150" r="2" fill="#6366F1"/>
    <line x1="90" y1="60" x2="150" y2="40" stroke="#818CF8" stroke-width="0.6"/>
    <line x1="90" y1="60" x2="60" y2="130" stroke="#818CF8" stroke-width="0.6"/>
    <line x1="1120" y1="55" x2="1060" y2="95" stroke="#22D3EE" stroke-width="0.6"/>
    <line x1="1060" y1="95" x2="1150" y2="150" stroke="#22D3EE" stroke-width="0.6"/>
  </g>

  <!-- flowing wave dividers, representing the workflow graph -->
  <path d="M0,210 C200,170 350,250 600,205 C850,160 1000,230 1200,190 L1200,280 L0,280 Z" fill="url(#waveGrad1)"/>
  <path d="M0,235 C220,270 400,195 650,235 C880,270 1020,205 1200,235 L1200,280 L0,280 Z" fill="url(#waveGrad2)"/>

  <!-- central owl-inspired mark: a simple geometric glyph for practical wisdom -->
  <g transform="translate(600,86)">
    <circle r="30" fill="url(#nodeGlow)"/>
    <circle r="17" fill="none" stroke="url(#textGrad)" stroke-width="2"/>
    <circle cx="-7" cy="-2" r="3.4" fill="#22D3EE"/>
    <circle cx="7" cy="-2" r="3.4" fill="#22D3EE"/>
    <path d="M-10,9 L0,15 L10,9" fill="none" stroke="#C084FC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="600" y="150" text-anchor="middle" font-family="Verdana, Geneva, sans-serif" font-size="46" font-weight="700" fill="url(#textGrad)" letter-spacing="1">PhronesisML</text>
  <text x="600" y="180" text-anchor="middle" font-family="Verdana, Geneva, sans-serif" font-size="15" fill="#C7D2FE" letter-spacing="3">PRACTICAL WISDOM FOR MACHINE LEARNING</text>
</svg>
